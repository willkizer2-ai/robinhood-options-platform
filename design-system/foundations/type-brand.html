<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px; }
  .big { font-family: var(--font-brand); font-size: 46px; color: var(--text-primary); line-height: 1.1; }
  .grad { font-family: var(--font-brand); font-size: 30px; line-height: 1.2; }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 16px; max-width: 560px; }
</style>
</head>
<body>
  <div class="big">Web Trace</div>
  <div class="grad wt-gradient-text">Trace the edge</div>
  <div class="note">Eagle Lake — reserved for the wordmark flourish, hero accent words, and oversized feature numerals. Avoid at small sizes or for tabular data; use JetBrains Mono there.</div>
</body>
</html>
