<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base grid — --space-1 through --space-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--periwinkle-400); border-radius: var(--radius-xs); width: 18px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="lbl">1·4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="lbl">2·8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="lbl">3·12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="lbl">4·16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="lbl">6·24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="lbl">8·32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="lbl">12·48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="lbl">16·64</div></div>
  </div>
</body>
</html>
