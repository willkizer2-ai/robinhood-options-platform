<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="--radius-xs through --radius-2xl + pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 56px; background: var(--surface-elevated); border: 1px solid var(--border-strong); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">xs·3</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm·6</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md·10</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg·14</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl·20</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lbl">2xl·28</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div></div>
  </div>
</body>
</html>
