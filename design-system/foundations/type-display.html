<!-- @dsCard group="Type" viewport="700x300" name="Display — Space Grotesk" subtitle="Bold geometric sans for headings and UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 96px; flex: none; }
  .d { font-family: var(--font-display); color: var(--text-primary); letter-spacing: var(--tracking-tight); line-height: 1.05; }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="tok">5xl · 700</span><span class="d" style="font-size:var(--text-5xl); font-weight:700">Web Trace</span></div>
    <div class="line"><span class="tok">3xl · 700</span><span class="d" style="font-size:var(--text-3xl); font-weight:700">Signals that earn their place</span></div>
    <div class="line"><span class="tok">xl · 600</span><span class="d" style="font-size:var(--text-xl); font-weight:600">Portfolio intelligence, live</span></div>
    <div class="line"><span class="tok">md · 500</span><span class="d" style="font-size:var(--text-md); font-weight:500">Real-time options desk</span></div>
  </div>
</body>
</html>
