name: Deploy Backend to Render

on:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:   # allow manual trigger

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Render's native GitHub integration auto-deploys on every push.
      # This step fires the deploy hook as an extra signal when one is configured.
      # continue-on-error ensures the workflow stays green even if the hook
      # isn't set or returns a non-2xx response.
      - name: Trigger Render deploy hook (optional)
        continue-on-error: true
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set — Render's GitHub integration handles auto-deploy."
            exit 0
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK" -H "Accept: application/json")
          echo "Render deploy hook response: HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || [ "$HTTP" = "204" ]; then
            echo "Deploy triggered successfully."
          else
            echo "Hook returned HTTP $HTTP — Render's GitHub integration will still auto-deploy."
          fi
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
