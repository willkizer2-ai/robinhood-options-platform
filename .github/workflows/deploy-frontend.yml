name: Deploy Frontend to Vercel

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:   # allow manual trigger

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@33

      # Source deploy — Vercel builds in the cloud (no local build step needed).
      # Requires VERCEL_TOKEN (PAT), VERCEL_ORG_ID, VERCEL_PROJECT_ID in repo secrets.
      # frontend/.vercel/project.json is committed so the CLI auto-detects the project.
      - name: Deploy to Vercel (source deploy)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN
