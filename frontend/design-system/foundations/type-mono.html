<!-- @dsCard group="Type" viewport="700x230" name="Data — JetBrains Mono" subtitle="Tabular numerals for prices, tickers, and metrics" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-family: var(--font-sans); font-size: 10px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--text-muted); padding: 0 0 10px; font-weight: 600; }
  td { padding: 7px 0; font-size: 14px; color: var(--text-secondary); border-top: 1px solid var(--border-subtle); }
  .tk { color: var(--text-primary); font-weight: 700; }
  .up { color: var(--up-text); }
  .dn { color: var(--down-text); }
</style>
</head>
<body>
  <table>
    <thead><tr><th>Ticker</th><th>Last</th><th>Δ Day</th><th>Strike</th><th>IV</th></tr></thead>
    <tbody>
      <tr><td class="tk">SPY</td><td>591.42</td><td class="up">+1.28%</td><td>592C</td><td>14.6%</td></tr>
      <tr><td class="tk">QQQ</td><td>524.07</td><td class="dn">−0.94%</td><td>523P</td><td>19.3%</td></tr>
      <tr><td class="tk">NVDA</td><td>138.55</td><td class="up">+2.71%</td><td>140C</td><td>48.2%</td></tr>
      <tr><td class="tk">TSLA</td><td>402.18</td><td class="dn">−1.07%</td><td>400P</td><td>61.0%</td></tr>
    </tbody>
  </table>
</body>
</html>
