<!-- @dsCard group="Colors" viewport="700x180" name="Periwinkle accent" subtitle="Brand ramp — #B4B4CC is the chart candle tone" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1 1 0; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; position: relative; }
  .star { position: absolute; top: 6px; right: 8px; color: var(--ink-950); font-size: 12px; }
  .meta { padding: 8px 10px; background: var(--surface-card); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--periwinkle-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#edeef6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-200)"></div><div class="meta"><div class="name">200</div><div class="hex">#dadcec</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#c7c9e0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-400)"><span class="star">★</span></div><div class="meta"><div class="name">400 · base</div><div class="hex">#b4b4cc</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-500)"></div><div class="meta"><div class="name">500</div><div class="hex">#9c9cba</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-600)"></div><div class="meta"><div class="name">600</div><div class="hex">#80819f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#646580</div></div></div>
  </div>
</body>
</html>
